<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴史ってそういうことか！</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Syne:wght@700;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT
============================================================ */
:root {
  --white: #ffffff;
  --off-white: #f8f8f6;
  --ink: #1c1c1a;
  --gray: #6b6b68;
  --light-gray: #e8e8e4;

  /* Era accent colors */
  --era-jomon-accent:   #d97706;
  --era-jomon-bg:       #fef3c7;
  --era-nara-accent:    #7c3aed;
  --era-nara-bg:        #ede9fe;
  --era-kamakura-accent:#0284c7;
  --era-kamakura-bg:    #e0f2fe;
  --era-sengoku-accent: #dc2626;
  --era-sengoku-bg:     #fee2e2;
  --era-edo-accent:     #ca8a04;
  --era-edo-bg:         #fef9c3;
  --era-meiji-accent:   #2563eb;
  --era-meiji-bg:       #dbeafe;
  --era-showa-accent:   #65a30d;
  --era-showa-bg:       #ecfccb;

  /* UI colors */
  --coral:    #ff5e5b;
  --mint:     #00c9a7;
  --yellow:   #ffe135;
  --sky:      #5bc8f5;
  --lavender: #a78bfa;

  /* Current era (dynamic) */
  --cur-accent: var(--era-edo-accent);
  --cur-bg:     var(--era-edo-bg);

  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 3px 3px 0 var(--ink);
  --shadow-sm: 2px 2px 0 var(--ink);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--off-white);
  color: var(--ink);
  min-height: 100vh;
}

/* ============================================================
   SCREENS
============================================================ */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ============================================================
   SHARED NAV HEADER
============================================================ */
.app-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: #3730a3;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--cur-accent);
}
.back-btn {
  background: none;
  border: 2px solid rgba(255,255,255,0.6);
  color: #ffffff;
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em;
  padding: 5px 12px;
  cursor: pointer;
  border-radius: 100px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.back-btn:hover { border-color: #fde68a; color: #fde68a; }
.header-title {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 16px; font-weight: 700;
  color: #ffffff; flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-badge {
  font-family: 'Syne', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  border-radius: 100px;
  background: #fde68a;
  color: #1c1c1a;
  flex-shrink: 0;
}

/* ============================================================
   HOME SCREEN
============================================================ */
#screen-home {
  background: linear-gradient(160deg, #2e1065 0%, #1e3a8a 100%);
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(255,225,53,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(255,94,91,0.1) 0%, transparent 50%);
  padding: 28px 16px 40px;
  align-items: center;
}

.home-logo {
  text-align: center;
  max-width: 520px; width: 100%;
  margin-bottom: 28px;
  animation: fadeUp 0.6s 0.1s ease both;
}
.home-icon {
  font-size: 48px; display: block; margin-bottom: 10px;
  animation: spinIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes spinIn { from{transform:rotate(-180deg) scale(0);opacity:0} to{transform:rotate(0) scale(1);opacity:1} }
.home-series {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.4em; color: var(--mint);
  text-transform: uppercase; margin-bottom: 10px;
}
.home-title {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(28px,7vw,48px); font-weight: 900;
  color: #ffffff;
  -webkit-text-stroke: 2px #3730a3;
  paint-order: stroke fill; line-height: 1.2; margin-bottom: 6px;
}
.home-title span { color: var(--yellow); -webkit-text-stroke: 2px #92400e; paint-order: stroke fill; }
.home-sub { font-size: 14px; color: #1c1c1a; font-weight: 700; }

.era-section-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.3em; color: #1c1c1a;
  text-transform: uppercase;
  max-width: 520px; width: 100%;
  margin-bottom: 10px;
  animation: fadeUp 0.6s 0.3s ease both; opacity: 0;
}

/* ERA GRID */
.era-grid {
  display: grid; grid-template-columns: repeat(2,1fr);
  gap: 8px; max-width: 520px; width: 100%;
  animation: fadeUp 0.6s 0.4s ease both; opacity: 0;
}

.era-card {
  border: 2.5px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 16px 14px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.2s, transform 0.1s;
}
.era-card:hover { border-color: rgba(255,255,255,0.35); transform: translate(-1px,-1px); }
.era-card.selected { border-color: var(--yellow) !important; box-shadow: 0 0 0 1px var(--yellow); }

/* era-specific bg tints */
.era-card.jomon { background: linear-gradient(135deg,#78350f,#451a03); }
.era-card.nara { background: linear-gradient(135deg,#4c1d95,#2e1065); }
.era-card.kamakura { background: linear-gradient(135deg,#1e3a8a,#0c1a4a); }
.era-card.sengoku { background: linear-gradient(135deg,#7f1d1d,#450a0a); }
.era-card.edo { background: linear-gradient(135deg,#713f12,#3a1e04); }
.era-card.meiji { background: linear-gradient(135deg,#1e3a8a,#0e1e4a); }
.era-card.showa { background: linear-gradient(135deg,#3f6212,#1a3006); }

.era-badge {
  position: absolute; top: 10px; right: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 8px; font-weight: 700;
  letter-spacing: 0.15em;
  padding: 3px 8px; border-radius: 100px;
  background: var(--cur-accent); color: var(--ink);
}

/* badge colors per era */
.era-card.jomon .era-badge { background: var(--era-jomon-accent); color: white; -webkit-text-stroke: 0.5px rgba(0,0,0,0.5); paint-order: stroke fill; }
.era-card.nara .era-badge { background: var(--era-nara-accent); color: white; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; }
.era-card.kamakura .era-badge { background: var(--era-kamakura-accent); color: white; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; }
.era-card.sengoku .era-badge { background: var(--era-sengoku-accent); color: white; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; }
.era-card.edo .era-badge { background: var(--era-edo-accent); color: white; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; }
.era-card.meiji .era-badge { background: var(--era-meiji-accent); color: white; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; }
.era-card.showa .era-badge { background: var(--era-showa-accent); color: white; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; }

.era-icon { font-size: 28px; display: block; margin-bottom: 8px; }
.era-period { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: #fde68a; -webkit-text-stroke: 0.3px rgba(0,0,0,0.4); paint-order: stroke fill; margin-bottom: 4px; }
.era-name { font-size: 18px; font-weight: 900; color: white; line-height: 1.2; margin-bottom: 4px; -webkit-text-stroke: 1.5px rgba(0,0,0,0.4); paint-order: stroke fill; }
.era-sub { font-size: 12px; color: #e0e7ff; -webkit-text-stroke: 0.3px rgba(0,0,0,0.3); paint-order: stroke fill; line-height: 1.4; }
.era-progress { font-size: 11px; color: #fde68a; margin-top: 6px; }

.start-btn-wrap {
  max-width: 520px; width: 100%; margin-top: 14px;
  animation: fadeUp 0.6s 0.5s ease both; opacity: 0;
}
.start-btn {
  width: 100%; padding: 16px;
  background: #fde68a; border: none; color: #1c1c1a;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 15px; font-weight: 900;
  border-radius: var(--radius);
  cursor: pointer; box-shadow: 3px 3px 0 rgba(255,225,53,0.4);
  transition: all 0.15s;
}
.start-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 rgba(255,225,53,0.5); }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* ============================================================
   HUB SCREEN
============================================================ */
#screen-hub { background: var(--off-white); }
#screen-hub .app-header { background: var(--ink); }

.hub-body {
  padding: 20px 16px 32px;
  max-width: 580px; margin: 0 auto; width: 100%;
  flex: 1; display: flex; flex-direction: column; gap: 14px;
}

.hub-hero {
  background: linear-gradient(135deg, #3730a3 0%, #1d4ed8 100%);
  border-radius: var(--radius);
  padding: 24px 20px;
  position: relative; overflow: hidden;
}
.hub-hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: var(--cur-accent);
  border-radius: 50%; opacity: 0.12;
}
.hub-era-icon { font-size: 36px; display: block; margin-bottom: 10px; }
.hub-era-title {
  font-size: clamp(22px,5vw,32px); font-weight: 900;
  color: white; line-height: 1.2; margin-bottom: 6px;
  -webkit-text-stroke: 1.5px rgba(0,0,0,0.35); paint-order: stroke fill;
}
.hub-era-title span { color: var(--yellow); }
.hub-era-sub { font-size: 14px; color: #e0e7ff; -webkit-text-stroke: 0.3px rgba(0,0,0,0.3); paint-order: stroke fill; }

.hub-mode-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.hub-mode-btn {
  background: white; border: 2.5px solid var(--ink);
  border-radius: var(--radius); padding: 16px 12px;
  cursor: pointer; text-align: center;
  box-shadow: var(--shadow-sm);
  transition: all 0.15s;
}
.hub-mode-btn:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.hub-mode-btn.primary {
  background: var(--cur-accent); border-color: var(--cur-accent);
  color: var(--ink);
}
.hub-mode-icon { font-size: 24px; display: block; margin-bottom: 6px; }
.hub-mode-label { font-size: 14px; font-weight: 900; display: block; margin-bottom: 2px; }
.hub-mode-desc { font-size: 12px; color: var(--gray); line-height: 1.4; }
.hub-mode-btn.primary .hub-mode-desc { color: rgba(0,0,0,0.5); }

.hub-progress-wrap {
  background: white; border: 2.5px solid var(--ink);
  border-radius: var(--radius); padding: 14px 16px;
  box-shadow: var(--shadow-sm);
}
.hub-progress-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.2em; color: #4f46e5;
  text-transform: uppercase; margin-bottom: 8px;
}
.hub-dots { display: flex; gap: 6px; flex-wrap: wrap; }
.hub-dot {
  width: 28px; height: 28px;
  border: 2px solid var(--light-gray);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
  color: var(--gray); cursor: pointer; transition: all 0.2s;
}
.hub-dot.read { background: var(--cur-accent); border-color: var(--cur-accent); color: white; }
.hub-dot.quiz-done { background: var(--coral); border-color: var(--coral); color: white; }

/* ============================================================
   EPISODE LIST
============================================================ */
#screen-list { background: var(--off-white); }

.ep-list-body {
  padding: 12px 16px;
  max-width: 580px; margin: 0 auto; width: 100%;
  display: flex; flex-direction: column; gap: 6px;
}

.ep-card {
  background: white; border: 2.5px solid var(--ink);
  border-radius: var(--radius); padding: 14px 16px;
  cursor: pointer; box-shadow: var(--shadow-sm);
  transition: all 0.1s;
  display: flex; align-items: center; gap: 12px;
}
.ep-card:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.ep-card.read { background: var(--off-white); }

.ep-num {
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
  color: var(--cur-accent); min-width: 36px; letter-spacing: 0.05em;
}
.ep-info { flex: 1; }
.ep-card-title { font-size: 16px; font-weight: 900; color: var(--ink); margin-bottom: 2px; }
.ep-card-sub { font-size: 13px; color: var(--gray); }
.ep-badge { font-size: 16px; }

.ep-card.ai-card {
  background: var(--ink); border-color: var(--yellow);
  box-shadow: 2px 2px 0 rgba(255,225,53,0.4);
}
.ep-card.ai-card .ep-num { color: var(--yellow); }
.ep-card.ai-card .ep-card-title { color: white; }
.ep-card.ai-card .ep-card-sub { color: rgba(255,255,255,0.4); }

/* ============================================================
   READER SCREEN
============================================================ */
#screen-reader { background: var(--off-white); }
#screen-reader .app-header { background: var(--ink); }

.quiz-trigger-btn {
  background: #f87171; border: none; color: white;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; padding: 6px 14px;
  border-radius: 100px; cursor: pointer;
  box-shadow: 2px 2px 0 rgba(255,94,91,0.4);
  transition: all 0.15s; flex-shrink: 0;
}
.quiz-trigger-btn:hover { transform: translate(-1px,-1px); }

.manga-content {
  max-width: 680px; margin: 0 auto; padding: 16px;
  width: 100%;
}

/* ============================================================
   MANGA PANEL COMPONENTS
============================================================ */
.manga-wrap { display: flex; flex-direction: column; gap: 4px; }

.m-cover {
  background: linear-gradient(135deg, #3b1fa8 0%, #1e3a8a 100%); border-radius: var(--radius);
  padding: 32px 24px 24px;
  position: relative; overflow: hidden; margin-bottom: 4px;
}
.m-cover::before {
  content: ''; position: absolute; top:-60px; right:-60px;
  width:220px; height:220px; background:var(--yellow);
  border-radius:50%; opacity:0.1;
}
.m-cover::after {
  content: ''; position:absolute; bottom:-40px; left:-40px;
  width:160px; height:160px; background:var(--coral);
  border-radius:50%; opacity:0.08;
}
.m-cover-series {
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:0.35em; color:#6ee7b7; -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill; text-transform:uppercase; margin-bottom:10px;
}
.m-cover-ep {
  display:inline-block; background:var(--yellow); color:var(--ink);
  font-family:'Syne',sans-serif; font-size:12px; font-weight:800;
  letter-spacing:0.15em; padding:3px 12px; border-radius:100px; margin-bottom:12px;
  -webkit-text-stroke: 0.5px rgba(0,0,0,0.3); paint-order: stroke fill;
}
.m-cover-title {
  font-size:clamp(24px,5vw,40px); font-weight:900;
  color:white; line-height:1.2; margin-bottom:8px; position:relative; z-index:1;
  -webkit-text-stroke: 1.5px rgba(0,0,0,0.35); paint-order: stroke fill;
}
.m-cover-title .hl { color:var(--yellow); }
.m-cover-sub {
  font-size:14px; font-weight:500; color:#e0e7ff;
  border-left:3px solid var(--coral); padding-left:10px; position:relative; z-index:1;
}

.m-page { display:flex; flex-direction:column; gap:4px; }

.m-panel {
  background:white; border-radius:var(--radius);
  border:2.5px solid var(--ink); box-shadow:var(--shadow-sm);
  overflow:hidden; position:relative;
}
.m-panel-inner { padding:16px; display:flex; flex-direction:column; gap:10px; }

.m-narr {
  background:#4f46e5; color:white;
  font-size:14px; font-weight:700; line-height:1.7;
  padding:8px 14px; border-radius:var(--radius-sm);
  align-self:flex-start;
}
.m-narr.accent { background:var(--mint); color:var(--ink); }
.m-narr.tone { background:var(--cur-accent); color:var(--ink); }
.m-narr.right { align-self:flex-end; }

.m-scene {
  position:absolute; top:0; left:0;
  background:var(--coral); color:white;
  font-size:11px; font-weight:700; letter-spacing:0.15em;
  padding:4px 12px; border-radius:0 0 var(--radius-sm) 0;
}

.m-bubble-wrap { display:flex; align-items:flex-start; gap:8px; }
.m-bubble-wrap.right { flex-direction:row-reverse; }
.m-char-col { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; }
.m-char-icon {
  width:46px; height:46px; border-radius:50%;
  border:2.5px solid var(--ink);
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
}
.m-char-icon.a { background:#fde8d8; }
.m-char-icon.b { background:#dbeafe; }
.m-char-icon.c { background:#dcfce7; }
.m-char-icon.d { background:#fef9c3; }
.m-char-name { font-size:11px; font-weight:700; color:var(--gray); text-align:center; white-space:nowrap; }

.m-bubble {
  background:white; border:2px solid var(--ink);
  border-radius:14px; padding:10px 14px;
  font-size:15px; line-height:1.65; font-weight:700;
  max-width:calc(100% - 62px);
  position:relative; box-shadow:var(--shadow-sm);
}
.m-bubble::before { content:''; position:absolute; top:13px; left:-8px; border:5px solid transparent; border-right-color:var(--ink); }
.m-bubble::after { content:''; position:absolute; top:14px; left:-5px; border:4px solid transparent; border-right-color:white; }
.m-bubble-wrap.right .m-bubble::before { left:auto; right:-8px; border-right-color:transparent; border-left-color:var(--ink); }
.m-bubble-wrap.right .m-bubble::after { left:auto; right:-5px; border-right-color:transparent; border-left-color:white; }
.m-bubble .note { font-size:10px; font-weight:500; color:rgba(0,0,0,0.4); display:block; margin-top:3px; }

.m-thought {
  background:#fef9e7; border:2px dashed var(--ink);
  border-radius:18px; padding:8px 12px;
  font-size:12px; font-weight:700;
  max-width:calc(100% - 62px); line-height:1.6;
}

.m-sfx-wrap { text-align:center; padding:6px 0; }
.m-sfx {
  font-family:'Syne',sans-serif; font-size:30px; font-weight:800;
  color:var(--coral); text-shadow:3px 3px 0 var(--ink);
  display:inline-block; transform:rotate(-2deg);
}

.m-split {
  display:grid; grid-template-columns:1fr 1fr;
  border:2.5px solid var(--ink); border-radius:var(--radius);
  box-shadow:var(--shadow-sm); overflow:hidden;
}
.m-split-half { padding:14px; display:flex; flex-direction:column; gap:7px; }
.m-split-half.edo-side { background:#fff8e7; border-right:2px solid var(--ink); }
.m-split-half.now-side { background:#e8f8ff; }
.m-split-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:700; letter-spacing:0.1em;
  padding:3px 9px; border-radius:100px; align-self:flex-start;
}
.m-split-badge.edo { background:var(--yellow); color:var(--ink); }
.m-split-badge.now { background:var(--sky); color:var(--ink); }
.m-split-emoji { font-size:28px; display:block; text-align:center; margin:3px 0; }
.m-split-list { display:flex; flex-direction:column; gap:4px; }
.m-split-item { font-size:13px; font-weight:700; line-height:1.5; color:var(--ink); display:flex; gap:5px; align-items:flex-start; }
.m-split-item::before { content:'▸'; color:var(--coral); flex-shrink:0; font-size:9px; margin-top:2px; }

.m-insight {
  background:#1e1b4b; border-radius:var(--radius);
  padding:18px 20px; position:relative; overflow:hidden;
}
.m-insight::before {
  content:''; position:absolute; top:-24px; right:-24px;
  width:100px; height:100px; background:#818cf8;
  border-radius:50%; opacity:0.15;
}
.m-insight-label {
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:0.3em; color:#fde68a; text-transform:uppercase;
  margin-bottom:8px; display:flex; align-items:center; gap:8px;
  -webkit-text-stroke: 0.5px rgba(0,0,0,0.4); paint-order: stroke fill;
}
.m-insight-label::before { content:''; display:block; width:16px; height:2px; background:var(--yellow); }
.m-insight-text {
  font-size:13px; line-height:1.9; color:rgba(255,255,255,0.85);
  font-weight:500; position:relative; z-index:1;
}
.m-insight-text strong { color:var(--yellow); font-weight:700; }

.m-footer {
  background:#3730a3; border-radius:var(--radius);
  padding:12px 18px; display:flex;

<script>

<script>
// ============================================================
// ERA THEME APPLY
// ============================================================
function applyEraTheme(era) {
  const r = document.documentElement.style;
  r.setProperty('--cur-accent', `var(--era-${era.id}-accent)`);
  r.setProperty('--cur-bg', `var(--era-${era.id}-bg)`);
  document.getElementById('home-icon').textContent = era.icon;
}

// ============================================================
// INIT HOME
// ============================================================
function initEraGrid() {
  const grid = document.getElementById('era-grid');
  grid.innerHTML = ERAS.map(era => {
    const readCount = (readMap[era.id] || []).length;
    const total = era.episodes.length;
    return `<div class="era-card ${era.cls}${era.id===currentEraId?' selected':''}" onclick="selectEra('${era.id}')">
      <div class="era-badge">${era.badge}</div>
      <span class="era-icon">${era.icon}</span>
      <div class="era-period">${era.period}</div>
      <div class="era-name">${era.name}</div>
      <div class="era-sub">${era.sub}</div>
      ${readCount>0?`<div class="era-progress">📖 ${readCount}/${total}話</div>`:''}
    </div>`;
  }).join('');
}

function selectEra(id) {
  currentEraId = id;
  currentEra = ERAS.find(e => e.id === id);
  applyEraTheme(currentEra);
  document.querySelectorAll('.era-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.era-card.${id}`)?.classList.add('selected');
  document.getElementById('start-btn').textContent = `「${currentEra.name}」で学ぶ ▶`;
}

function goToHub() {
  renderHub();
  showScreen('hub');
}

// ============================================================
// HUB
// ============================================================
function renderHub() {
  const era = currentEra;
  document.getElementById('hub-badge').textContent = era.badge;
  document.getElementById('hub-badge').style.background = `var(--era-${era.id}-accent)`;
  document.getElementById('hub-header-title').textContent = era.name;
  document.getElementById('hub-icon').textContent = era.icon;
  document.getElementById('hub-title').innerHTML = `<span>${era.icon}</span> ${era.name}<span style="color:var(--yellow)">を学ぶ</span>`;
  document.getElementById('hub-sub').textContent = `${era.period} ／ ${era.sub}`;

  const eraRead = readMap[era.id] || [];
  const eraQuiz = quizMap[era.id] || {};
  const dots = document.getElementById('hub-dots');
  dots.innerHTML = era.episodes.map((ep, i) => {
    const read = eraRead.includes(i);
    const quiz = eraQuiz[i] !== undefined;
    const cls = quiz ? 'quiz-done' : read ? 'read' : '';
    return `<div class="hub-dot ${cls}" onclick="readEp(${i})" title="${ep.keyword}">${i+1}</div>`;
  }).join('');

  document.getElementById('hub-prog-label').textContent =
    `📖 ${eraRead.length}/${era.episodes.length}話読了`;
}

// ============================================================
// EPISODE LIST
// ============================================================
function showEpList() {
  const era = currentEra;
  const badge = document.getElementById('list-badge');
  badge.textContent = era.badge;
  badge.style.background = `var(--era-${era.id}-accent)`;
  badge.style.color = 'white';

  const eraRead = readMap[era.id] || [];
  const eraQuiz = quizMap[era.id] || {};
  const body = document.getElementById('ep-list-body');
  body.innerHTML = era.episodes.map((ep, i) => {
    const read = eraRead.includes(i);
    const score = eraQuiz[i];
    const badge = score !== undefined ? '✅' : read ? '📖' : '';
    return `<div class="ep-card ${read?'read':''}" onclick="readEp(${i})">
      <div class="ep-num">EP.${String(ep.id).padStart(2,'0')}</div>
      <div class="ep-info">
        <div class="ep-card-title">${ep.title}</div>
        <div class="ep-card-sub">${ep.subtitle}${score!==undefined?' ／ クイズ '+score+'/3点':''}</div>
      </div>
      <div class="ep-badge">${badge}</div>
    </div>`;
  }).join('');
  showScreen('list');
}

// ============================================================
// READER
// ============================================================
function readEp(idx) {
  currentEpIdx = idx;
  const ep = currentEra.episodes[idx];
  document.getElementById('reader-title').textContent = `${currentEra.icon} 第${ep.id}話 ${ep.keyword}`;
  document.getElementById('quiz-btn').style.display = '';
  document.getElementById('manga-content').innerHTML = buildMangaHtml(ep, currentEra);

  if (!readMap[currentEraId]) readMap[currentEraId] = [];
  if (!readMap[currentEraId].includes(idx)) {
    readMap[currentEraId].push(idx);
    localStorage.setItem('readMap2', JSON.stringify(readMap));
  }
  showScreen('reader');
  document.getElementById('screen-reader').scrollTop = 0;
}

function startQuiz(eraId, epIdx) {
  lastQuizEraId = eraId;
  lastQuizEpIdx = epIdx;
  const era = ERAS.find(e=>e.id===eraId);
  const ep = era.episodes[epIdx];

  currentQuizIdx = 0;
  quizScore = 0;
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id => { document.getElementById(id).style.display=''; });
  document.getElementById('quiz-result').className = 'quiz-result';
  document.getElementById('quiz-ep-label').textContent = `${era.icon} ${era.name}「${ep.keyword}」`;
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const q = currentQuiz[currentQuizIdx];
  document.getElementById('quiz-prog-bar').innerHTML =
    currentQuiz.map((_,i)=>`<div class="quiz-pd ${i<currentQuizIdx?'done':i===currentQuizIdx?'current':''}"></div>`).join('');
  document.getElementById('quiz-question').textContent = q.q;
  document.getElementById('quiz-options').innerHTML =
    q.opts.map((o,i)=>`<button class="quiz-option" onclick="answer(${i})">${o}</button>`).join('');
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-next-btn').className = 'quiz-next-btn';
}

function answer(chosen) {
  const q = currentQuiz[currentQuizIdx];
  document.querySelectorAll('.quiz-option').forEach(o=>o.disabled=true);
  const fb = document.getElementById('quiz-feedback');
  if (chosen===q.ans) {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('correct');
    fb.className='quiz-feedback correct-fb show';
    fb.innerHTML=`⭕ 正解！<br>${q.exp}`;
    quizScore++;
  } else {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('wrong');
    document.querySelectorAll('.quiz-option')[q.ans].classList.add('correct');
    fb.className='quiz-feedback wrong-fb show';
    fb.innerHTML=`❌ 不正解。正解は「${q.opts[q.ans]}」<br>${q.exp}`;
  }
  document.getElementById('quiz-next-btn').className='quiz-next-btn show';
}

function nextQuestion() {
  currentQuizIdx++;
  if(currentQuizIdx>=currentQuiz.length) showResult();
  else renderQuestion();
}

function showResult() {
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id=>{ document.getElementById(id).style.display='none'; });
  const era = ERAS.find(e=>e.id===lastQuizEraId);
  const ep = era.episodes[lastQuizEpIdx];
  if(!quizMap[lastQuizEraId]) quizMap[lastQuizEraId]={};
  quizMap[lastQuizEraId][lastQuizEpIdx]=quizScore;
  localStorage.setItem('quizMap2',JSON.stringify(quizMap));
  const stamps=['😢','😅','😊','🎉'];
  const labels=['もう一度読んでみよう！','もう少し！','よくできました！','満点！完璧！'];
  const si=quizScore===3?3:quizScore>=2?2:quizScore===1?1:0;
  document.getElementById('result-stamp').textContent=stamps[si];
  document.getElementById('result-score').textContent=`${quizScore}/3`;
  document.getElementById('result-label').textContent=labels[si];
  document.getElementById('result-sub').textContent=`${era.name}「${ep.keyword}」のクイズ結果`;
  document.getElementById('quiz-result').className='quiz-result show';
}

function retryQuiz() { startQuiz(lastQuizEraId,lastQuizEpIdx); }

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='home') initEraGrid();
  if(name==='hub') renderHub();
  
}

// ============================================================
// BOOT
// ============================================================
selectEra('edo');
initEraGrid();
</script>
</body>
</html>
